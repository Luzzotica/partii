syntax = "proto3";

package gyrii;

// Enums - replace string keys for compact encoding
enum WeaponType {
  WEAPON_UNSPECIFIED = 0;
  WEAPON_SMG = 1;
  WEAPON_DUAL_MACHINE_GUN = 2;
  WEAPON_CHAIN_GUN = 3;
  WEAPON_PHOTON_RIFLE = 4;
  WEAPON_BAZOOKA = 5;
  WEAPON_FLAMETHROWER = 6;
  WEAPON_SHOTGUN = 7;
}

enum SecondaryType {
  SECONDARY_UNSPECIFIED = 0;
  SECONDARY_POPUP_KNIVES = 1;
  SECONDARY_BUBBLE_SHIELD = 2;
  SECONDARY_SELF_DESTRUCT_NUKE = 3;
  SECONDARY_POPUP_HAMMERS = 4;
  SECONDARY_DASH = 5;
}

enum GameMode {
  GAME_MODE_UNSPECIFIED = 0;
  GAME_MODE_FREE_FOR_ALL = 1;
  GAME_MODE_TEAM_DEATHMATCH = 2;
  GAME_MODE_CAPTURE_THE_FLAG = 3;
}

enum GameState {
  GAME_STATE_UNSPECIFIED = 0;
  GAME_STATE_WAITING = 1;
  GAME_STATE_STARTING = 2;
  GAME_STATE_IN_PROGRESS = 3;
  GAME_STATE_ENDED = 4;
}

enum MapId {
  MAP_UNSPECIFIED = 0;
  MAP_ARENA = 1;
  MAP_MAZE = 2;
  MAP_WAREHOUSE = 3;
  MAP_CUSTOM = 4;
}
