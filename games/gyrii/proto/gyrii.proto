syntax = "proto3";

package gyrii;

import "common.proto";
import "player.proto";
import "lobby.proto";
import "combat.proto";
import "actions.proto";
import "delta.proto";

// Server -> Client: init on connect
message Init {
  bytes identity = 1;  // 16-byte UUID
}

// Server -> Client: success response
message Ok {
  bool ok = 1;
}

// Server -> Client: error response
message Error {
  string error = 1;
}

// Top-level wrapper: all server->client messages
message ServerMessage {
  oneof message {
    Init init = 1;
    Ok ok = 2;
    Error error = 3;
    LobbyState lobby_state = 4;
    LobbyList lobby_list = 5;
    Delta delta = 6;
    PlayerJoined player_joined = 7;
    PlayerLeft player_left = 8;
    GameEnded game_ended = 9;
  }
}

// Client -> Server: all actions
message ClientMessage {
  oneof message {
    Authenticate authenticate = 1;
    ListLobbies list_lobbies = 2;
    CreateLobby create_lobby = 3;
    JoinLobby join_lobby = 4;
    RequestLobbyState request_lobby_state = 5;
    LeaveLobby leave_lobby = 6;
    SetReady set_ready = 7;
    StartGame start_game = 8;
    EndGame end_game = 9;
    RequestSpawn request_spawn = 10;
    UpdateInput update_input = 11;
    SetShooting set_shooting = 12;
    SetLoadout set_loadout = 13;
    SetMarbleConfig set_marble_config = 14;
    Shoot shoot = 15;
    DetonateRocket detonate_rocket = 16;
    ThrowGrenade throw_grenade = 17;
    ThrowMolotov throw_molotov = 18;
    UseSecondary use_secondary = 19;
  }
}
