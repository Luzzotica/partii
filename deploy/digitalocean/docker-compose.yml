services:
  gyrii-server:
    build:
      context: ../..
      dockerfile: games/gyrii/server/Dockerfile
    env_file:
      - ../../games/gyrii/server/.env.prod
    restart: unless-stopped
    expose:
      - "4000"

  caddy:
    image: caddy:2
    depends_on:
      - gyrii-server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
