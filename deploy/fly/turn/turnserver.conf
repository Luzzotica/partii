# coturn config for arcade-turn on Fly.io.
#
# Plain TURN/STUN only — TURNS (TLS on 5349) is intentionally not configured.
# Mobile carriers and home networks let UDP out fine; TURNS is only needed
# when a network blocks UDP and 3478/tcp entirely. Add it back if you ever
# hear about a real customer hitting that wall.
#
# Auth is HMAC time-limited credentials (use-auth-secret). Creds are minted
# by the Next.js app (hexii/lib/api/turn.ts) using the same shared secret.

# ─── Listening ────────────────────────────────────────────────────────────────
listening-port=3478
# `listening-ip` / `relay-ip` are NOT set here — usage-reporter.mjs resolves
# `fly-global-services` at startup and passes them via CLI. Fly's UDP edge
# drops replies sent from `0.0.0.0` (Linux picks the private fdaa:: source),
# so binding to the fly-global-services address is mandatory for UDP to work.

# ICE/STUN fingerprint attribute (required for WebRTC).
fingerprint

# Long-term credential mechanism in HMAC mode.
lt-cred-mech
use-auth-secret
# `static-auth-secret` is injected at startup from the TURN_SHARED_SECRET
# Fly secret — see fly.toml's [experimental] cmd.

# Realm — defaults to arcade-turn.fly.dev; override via TURN_REALM env in fly.toml.

# Relay port range. Must match the ports declared in fly.toml — coturn
# allocates ephemeral relay ports from this range, and any port not also
# exposed by Fly silently fails to relay. Keep both ranges in sync.
min-port=49160
max-port=49170

# ─── Hardening ────────────────────────────────────────────────────────────────
# Disallow relaying to private + link-local ranges so this can't be used as
# a probe for internal/cloud-metadata services.
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255

no-multicast-peers
no-loopback-peers
no-cli

# Bandwidth + allocation abuse caps. This is the single most important defence
# against a leaked TURN credential being used as a free relay/proxy: even with
# valid HMAC creds, no session can move meaningful bandwidth and the server's
# total egress is bounded.
#
# total-quota / user-quota are ALLOCATION COUNTS (not KB/s): concurrent relay
# allocations allowed server-wide and per-username respectively.
total-quota=200
user-quota=10
# max-bps caps a SINGLE session's throughput in bytes/sec (input and output
# counted separately). ~200 KB/s (~1.6 Mbps) is generous for game datachannels
# but useless for proxying video/torrents. Anything above is dropped.
max-bps=200000
# bps-capacity caps the server's COMBINED relay bandwidth in bytes/sec. 0 = no
# limit (dangerous — one busy/abusive period can run up the whole Fly egress
# bill). Cap at ~12.5 MB/s (~100 Mbps) so total egress is bounded regardless of
# how many sessions are active.
bps-capacity=12500000

# ─── Logging ──────────────────────────────────────────────────────────────────
# Log to stdout so Fly captures it. Allocation lines include `username=...`,
# which our Next.js minter encodes as `<expiry>:k=<apiKeyId>:p=<peerId>` —
# parse these for per-API-key billing.
log-file=stdout
simple-log
no-stdout-log=false
